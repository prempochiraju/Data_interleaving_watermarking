<h2 class="sr-only">Pie chart showing overhead analysis with 97.6% useful data and 2.4% protocol overhead</h2>

<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>Voice Data 92.8%</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>Interleaved Data 4.7%</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #BA7517;"></span>Protocol Overhead 2.4%</span>
</div>

<div style="position: relative; width: 100%; height: 320px;">
  <canvas id="overheadChart" role="img" aria-label="Overhead analysis pie chart showing 97.6% useful data comprising 92.8% voice and 4.7% interleaved data, with only 2.4% protocol overhead">Voice: 54,201 bytes (92.8%). Interleaved data: 2,764 bytes (4.7%). Overhead: 1,382 bytes (2.4%).</canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('overheadChart'), {
  type: 'doughnut',
  data: {
    labels: ['Voice Data (92.8%)', 'Interleaved Data (4.7%)', 'Protocol Overhead (2.4%)'],
    datasets: [{
      data: [54201, 2764, 1382],
      backgroundColor: ['#378ADD', '#1D9E75', '#BA7517'],
      borderWidth: 2,
      borderColor: '#fff'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      title: {
        display: true,
        text: 'Overhead Analysis - Data Composition',
        font: { size: 16, weight: '500' },
        padding: { bottom: 20 }
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            const label = context.label || '';
            const value = context.parsed.toLocaleString();
            const percent = ((context.parsed / 58347) * 100).toFixed(2);
            return label + ': ' + value + ' bytes (' + percent + '%)';
          }
        }
      }
    }
  }
});
</script>
